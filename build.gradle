plugins {
    id 'java'
    id 'application'
}

repositories {
    mavenCentral()
}

application {
    mainClass = 'app.Main'
}

java{
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

dependencies {
    implementation "net.java.dev.jna:jna:5.14.0"
    implementation "net.java.dev.jna:jna-platform:5.14.0"
}